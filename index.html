      <h2>Отправить анонимный вопрос на собрание Мира</h2><br>
    <form id="telegramForm">
      <label for="message">Сообщение:</label><br>
      <textarea id="message" name="message" rows="4" cols="50" required></textarea><br><br>
      <button type="submit">Отправить</button>

  <script>
    // Получаем элементы по их ID
    const кнопкаПереключения = document.getElementById('кнопка-переключения');
    const текстДляПереключения = document.getElementById('текст-для-переключения');

    // Добавляем слушатель события клика на кнопку
    кнопкаПереключения.addEventListener('click', function() {
      // Переключаем класс "показан" на элементе текста
      текстДляПереключения.classList.toggle('показан');

      // Изменяем текст кнопки в зависимости от состояния текста
      if (текстДляПереключения.classList.contains('показан')) {
        кнопкаПереключения.textContent = 'Скрыть вакантные служения';
      } else {
        кнопкаПереключения.textContent = 'Вакантные служения';
      }
    });
  </script>
    <script>
      // Телеграмм отправка==========================================================
      const TELEGRAM_TOKEN   = '7831903358:AAHIkRNmstPV5QYoRC5GYqGiuGppTlLiotk'; // вставьте сюда токен бота
      const CHAT_ID = '-1002657190873'; // вставьте сюда ваш chat_id     
    
      document.getElementById('telegramForm').addEventListener('submit', function(e) {
        e.preventDefault();
    
        const message = document.getElementById('message').value.trim();
    
        if (!message) {
          alert('Пожалуйста, введите сообщение.');
          return;
        }
    
        const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
    
        axios.post(url, {
          chat_id: CHAT_ID,
          text: message
        })
        .then(function(response) {
          alert('Сообщение успешно отправлено!');
          document.getElementById('telegramForm').reset();
        })
        .catch(function(error) {
          alert('Ошибка при отправке сообщения. Проверьте правильность данных и наличие доступа.');
          console.error(error);
        });
      });
    </script>
    <script>
    // =Слйдер ==========================================
    let currentIndex = 0;
      const slides = document.querySelectorAll('.slide');
      
      function showSlide(index) {
          slides.forEach((slide, i) => {
              slide.style.display = (i === index) ? 'block' : 'none';
          });
      }
      
      document.getElementById('prev').addEventListener('click', function() {
          currentIndex = (currentIndex > 0) ? currentIndex - 1 : slides.length - 1;
          showSlide(currentIndex);
      });
      
      document.getElementById('next').addEventListener('click', function() {
          currentIndex = (currentIndex < slides.length - 1) ? currentIndex + 1 : 0;
          showSlide(currentIndex);
      });
      
      // Инициализировать первый слайд
      showSlide(currentIndex);</script>
